name: palio_dashboard
description: OBD2 dashboard para Fiat Palio Fire Economy — Marelli IAW
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # Bluetooth
  flutter_bluetooth_serial: ^0.4.0

  # HTTP / API
  dio: ^5.4.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI / Gauges
  syncfusion_flutter_gauges: ^25.1.0
  fl_chart: ^0.67.0
  google_fonts: ^6.2.1

  # OTA
  open_file: ^3.3.2
  path_provider: ^2.1.2
  package_info_plus: 9.0.1

  # WebSocket (PC viewer)
  web_socket_channel: ^2.4.0

  # Persistência
  shared_preferences: ^2.2.3

  # Permissões
  permission_handler: ^11.3.1

  # Logs remotos (diagnóstico/depuração)
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  device_info_plus: ^10.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.2

flutter:
  uses-material-design: true
