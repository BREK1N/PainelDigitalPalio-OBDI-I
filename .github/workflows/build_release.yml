name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: palio_dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_bluetooth_serial (pacote sem manutenção desde 2021)
        run: |
          PKG_DIR=$(find "${PUB_CACHE:-$HOME/.pub-cache}" -maxdepth 4 -type d -name 'flutter_bluetooth_serial-*' | head -n1)
          GRADLE_FILE="$PKG_DIR/android/build.gradle"
          echo "Patching $GRADLE_FILE"
          sed -i 's/jcenter()/mavenCentral()/g' "$GRADLE_FILE"
          sed -i 's/compileSdkVersion 30/compileSdkVersion 36/' "$GRADLE_FILE"
          sed -i "/^android {/a\\    namespace 'io.github.edufolly.flutterbluetoothserial'" "$GRADLE_FILE"
          cat "$GRADLE_FILE"

      - name: Build APK release
        run: flutter build apk --release --obfuscate --split-debug-info=debug_info/

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk palio_dashboard.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: palio_dashboard/palio_dashboard.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
