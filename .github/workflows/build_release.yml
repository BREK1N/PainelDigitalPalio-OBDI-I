name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: palio_dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK release
        run: flutter build apk --release --obfuscate --split-debug-info=debug_info/

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk palio_dashboard.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: palio_dashboard/palio_dashboard.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
